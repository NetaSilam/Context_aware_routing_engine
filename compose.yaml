services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: routing-engine-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-routing_engine}
      POSTGRES_USER: ${POSTGRES_USER:-routing_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routing_engine_dev_password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-routing_engine} -d ${POSTGRES_DB:-routing_engine}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - postgis_data:/var/lib/postgresql/data
    # Not exposed to the host on purpose: only the web container talks to the DB directly.

  osrm:
    image: osrm/osrm-backend
    container_name: routing-engine-osrm
    restart: unless-stopped
    command: >
      osrm-routed --algorithm mld
      /data/${OSRM_GRAPH_NAME:-israel-and-palestine-latest}.osrm
    volumes:
      # Prepared graph, not committed - see osrm/README.md to (re)generate it.
      - ./osrm/data:/data:ro
    # Not exposed to the host: only the web container calls this directly.

  web:
    build: ./backend
    container_name: routing-engine-web
    restart: unless-stopped
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-routing_engine}:${POSTGRES_PASSWORD:-routing_engine_dev_password}@postgis:5432/${POSTGRES_DB:-routing_engine}
      ENABLE_TEST_ENDPOINTS: ${ENABLE_TEST_ENDPOINTS:-false}
      OSRM_BASE_URL: http://osrm:5000
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me}
    # No `ports:` on purpose - only the frontend container talks to this API
    # directly (see compose network); clients only ever reach the frontend.
    volumes:
      # Read-only: the foundation pipeline's parquet/geoparquet exports, loaded into
      # PostGIS on first startup by app/seed.py (see data/README.md for what's in here).
      - ./data:/data:ro

  frontend:
    build: ./frontend
    container_name: routing-engine-frontend
    restart: unless-stopped
    depends_on:
      - web
    environment:
      API_PROXY_TARGET: http://web:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  postgis_data:
